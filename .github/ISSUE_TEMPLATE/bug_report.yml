name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Open Chronos
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag or commit hash.
      placeholder: v1.0.0

  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, debug.log output, or anything else relevant.
