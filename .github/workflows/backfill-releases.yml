name: Backfill releases

# One-off workflow: iterate through every '## [x.y.z]' section of CHANGELOG.md,
# tag the appropriate commit if no tag exists yet, and create-or-update the
# GitHub release for the tag so the release body matches the CHANGELOG entry.
#
# Safe to re-run: POSTs a new release when none exists, PATCHes the body/name
# when an empty stub release already exists. Delete this workflow file once
# all historical releases are in place.

on:
  push:
    branches: [main]
    paths: [.github/workflows/backfill-releases.yml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create missing releases via API (auto-creates tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          API: ${{ github.api_url }}
        run: |
          set -x
          # For retroactive versions never tagged, POST /releases with both
          # tag_name and target_commitish. GitHub creates the tag at that SHA
          # as part of publishing the release.
          create_retro() {
            local VERSION="$1"
            local TAG="v$VERSION"
            local SHA="$2"

            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API/repos/$REPO/releases/tags/$TAG")
            if [ "$STATUS" = "200" ]; then
              echo "Release $TAG already exists, skipping retro-create."
              return 0
            fi

            BODY=$(awk -v v="$VERSION" '
              $0 ~ "^## \\[" v "\\]" { found=1; next }
              found && /^## / { exit }
              found && /^\[[^]]+\]:/ { exit }
              found { print }
            ' CHANGELOG.md)
            [ -z "$BODY" ] && BODY="No changelog entry for this release."

            PAYLOAD=$(jq -n \
              --arg tag "$TAG" \
              --arg name "$TAG" \
              --arg body "$BODY" \
              --arg target "$SHA" \
              '{tag_name: $tag, name: $name, body: $body, target_commitish: $target, draft: false, prerelease: false}')

            RESPONSE=$(curl -sS -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API/repos/$REPO/releases" \
              -d "$PAYLOAD")
            if echo "$RESPONSE" | jq -e '.id' >/dev/null 2>&1; then
              echo "OK: $TAG"
            else
              echo "FAILED: $TAG -> $RESPONSE"
            fi
          }

          create_retro 1.0.1  eaaaa58f183d7df5b4f6712dafde5cbf9e8ce0df
          create_retro 1.0.12 5675656789d5254be29d7b61c3453d567b153ab2

      - name: Create or update releases from CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          API: ${{ github.api_url }}
        run: |
          set -x
          echo "API=$API  REPO=$REPO"

          VERSIONS=$(grep -E '^## \[[0-9]' CHANGELOG.md | sed -E 's/^## \[([^]]+)\].*/\1/')
          echo "Versions from CHANGELOG:"
          echo "$VERSIONS"

          for VERSION in $VERSIONS; do
            TAG="v$VERSION"
            echo "=== $TAG ==="

            if ! git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG$"; then
              echo "No remote tag for $TAG, skipping."
              continue
            fi

            BODY=$(awk -v v="$VERSION" '
              $0 ~ "^## \\[" v "\\]" { found=1; next }
              found && /^## / { exit }
              found && /^\[[^]]+\]:/ { exit }
              found { print }
            ' CHANGELOG.md)
            if [ -z "$BODY" ]; then
              BODY="No changelog entry for this release."
            fi

            PAYLOAD=$(jq -n \
              --arg tag "$TAG" \
              --arg name "$TAG" \
              --arg body "$BODY" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')

            EXISTING=$(curl -sS \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API/repos/$REPO/releases/tags/$TAG")
            REL_ID=$(echo "$EXISTING" | jq -r '.id // empty')

            if [ -n "$REL_ID" ]; then
              echo "Release exists (id=$REL_ID), updating..."
              RESPONSE=$(curl -sS -X PATCH \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "$API/repos/$REPO/releases/$REL_ID" \
                -d "$PAYLOAD")
            else
              echo "Release missing, creating..."
              RESPONSE=$(curl -sS -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "$API/repos/$REPO/releases" \
                -d "$PAYLOAD")
            fi

            if echo "$RESPONSE" | jq -e '.id' >/dev/null 2>&1; then
              echo "OK: $TAG"
            else
              echo "FAILED: $TAG -> $RESPONSE"
            fi
          done
