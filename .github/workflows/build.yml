name: Build

on:
  workflow_call:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2 + toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          cache: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            git

      - name: Configure
        shell: msys2 {0}
        run: |
          set -o pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++ -DBUILD_TESTS=ON 2>&1 | tee configure-output.txt

      - name: Build
        shell: msys2 {0}
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.txt

      - name: Test
        shell: msys2 {0}
        run: |
          set -o pipefail
          cd build && ctest --output-on-failure 2>&1 | tee ../test-output.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-logs
          path: |
            configure-output.txt
            build-output.txt
            test-output.txt
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tail = (p, n = 150) => {
              try {
                const lines = fs.readFileSync(p, 'utf8').split('\n');
                return lines.slice(-n).join('\n');
              } catch { return '(not generated)'; }
            };
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = [
              `## CI failure: \`build-and-test\` (Windows) on \`${process.env.GITHUB_REF_NAME}\``,
              ``,
              `**Commit:** ${process.env.GITHUB_SHA}`,
              `**Run:** ${runUrl}`,
              ``,
              `### configure-output.txt`,
              `\`\`\``,
              tail('configure-output.txt'),
              `\`\`\``,
              `### build-output.txt`,
              `\`\`\``,
              tail('build-output.txt'),
              `\`\`\``,
              `### test-output.txt`,
              `\`\`\``,
              tail('test-output.txt'),
              `\`\`\``,
            ].join('\n').slice(0, 65000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failure: build-and-test (Windows) on ${process.env.GITHUB_REF_NAME} @ ${process.env.GITHUB_SHA.slice(0,7)}`,
              body,
              labels: ['ci', 'bug'],
            });

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronos
          path: build/chronos.exe

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-19 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-19 cmake ninja-build

      - name: Configure
        run: |
          set -o pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++-19 -DBUILD_TESTS=ON 2>&1 | tee configure-output.txt

      - name: Build
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.txt

      - name: Test
        run: |
          set -o pipefail
          cd build && ctest --output-on-failure 2>&1 | tee ../test-output.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-logs
          path: |
            configure-output.txt
            build-output.txt
            test-output.txt
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tail = (p, n = 150) => {
              try {
                const lines = fs.readFileSync(p, 'utf8').split('\n');
                return lines.slice(-n).join('\n');
              } catch { return '(not generated)'; }
            };
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = [
              `## CI failure: \`test-linux\` (Release) on \`${process.env.GITHUB_REF_NAME}\``,
              ``,
              `**Commit:** ${process.env.GITHUB_SHA}`,
              `**Run:** ${runUrl}`,
              ``,
              `### configure-output.txt`,
              `\`\`\``,
              tail('configure-output.txt'),
              `\`\`\``,
              `### build-output.txt`,
              `\`\`\``,
              tail('build-output.txt'),
              `\`\`\``,
              `### test-output.txt`,
              `\`\`\``,
              tail('test-output.txt'),
              `\`\`\``,
            ].join('\n').slice(0, 65000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failure: test-linux (Release) on ${process.env.GITHUB_REF_NAME} @ ${process.env.GITHUB_SHA.slice(0,7)}`,
              body,
              labels: ['ci', 'bug'],
            });

