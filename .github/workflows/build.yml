name: Build

on:
  workflow_call:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2 + toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          cache: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            git

      - name: Configure
        shell: msys2 {0}
        run: |
          set -o pipefail
          cmake --preset test 2>&1 | tee configure-output.txt

      - name: Build
        shell: msys2 {0}
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.txt

      - name: Test
        shell: msys2 {0}
        run: |
          set -o pipefail
          cd build && ctest --output-on-failure 2>&1 | tee ../test-output.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-logs
          retention-days: 7
          path: |
            configure-output.txt
            build-output.txt
            test-output.txt
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          job-name: build-and-test (Windows)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronos
          path: build/chronos.exe

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup-llvm

      - name: Configure
        run: |
          set -o pipefail
          cmake --preset test -DCMAKE_CXX_COMPILER=clang++-19 2>&1 | tee configure-output.txt

      - name: Build
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.txt

      - name: Test
        run: |
          set -o pipefail
          cd build && ctest --output-on-failure 2>&1 | tee ../test-output.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-logs
          retention-days: 7
          path: |
            configure-output.txt
            build-output.txt
            test-output.txt
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          job-name: test-linux (Release)

  test-linux-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup-llvm

      - name: Configure
        run: |
          set -o pipefail
          cmake --preset debug -DCMAKE_CXX_COMPILER=clang++-19 2>&1 | tee configure-output.txt

      - name: Build (Debug)
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.txt

      - name: Test (Debug)
        run: |
          set -o pipefail
          cd build && ctest --output-on-failure 2>&1 | tee ../test-output.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-debug-logs
          retention-days: 7
          path: |
            configure-output.txt
            build-output.txt
            test-output.txt
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          job-name: test-linux-debug (Debug)

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup-llvm

      - name: Configure
        run: |
          set -o pipefail
          cmake --preset coverage -DCMAKE_CXX_COMPILER=clang++-19 2>&1 | tee configure-output.txt

      - name: Build
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.txt

      - name: Test
        run: |
          set -o pipefail
          cd build && LLVM_PROFILE_FILE="chronos-%p.profraw" ctest --output-on-failure 2>&1 | tee ../test-output.txt

      - name: Generate coverage report
        run: |
          set -o pipefail
          llvm-profdata-19 merge -sparse build/chronos-*.profraw -o build/merged.profdata
          llvm-cov-19 report build/chronos_tests -instr-profile=build/merged.profdata -ignore-filename-regex='_deps|tests/' 2>&1 | tee coverage-report.txt
          echo "--- Coverage Summary ---"
          tail -1 coverage-report.txt
          llvm-cov-19 export build/chronos_tests -instr-profile=build/merged.profdata -format=lcov -ignore-filename-regex='_deps|tests/' > coverage.lcov

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          retention-days: 30
          path: |
            coverage-report.txt
            coverage.lcov
          if-no-files-found: ignore

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-logs
          retention-days: 7
          path: |
            configure-output.txt
            build-output.txt
            test-output.txt
          if-no-files-found: ignore

  sanitizer-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup-llvm

      - name: Configure
        run: |
          set -o pipefail
          cmake --preset sanitize -DCMAKE_CXX_COMPILER=clang++-19 2>&1 | tee configure-output.txt

      - name: Build with sanitizers
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.txt

      - name: Test with sanitizers
        run: |
          set -o pipefail
          cd build && ctest --output-on-failure 2>&1 | tee ../test-output.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-logs
          retention-days: 7
          path: |
            configure-output.txt
            build-output.txt
            test-output.txt
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          job-name: sanitizer-check
