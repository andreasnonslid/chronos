name: Build

on:
  workflow_call:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2 + toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          cache: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            git

      - name: Configure
        shell: msys2 {0}
        run: |
          set -o pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++ -DBUILD_TESTS=ON 2>&1 | tee configure-output.txt

      - name: Build
        shell: msys2 {0}
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.txt

      - name: Test
        shell: msys2 {0}
        run: |
          set -o pipefail
          cd build && ctest --output-on-failure 2>&1 | tee ../test-output.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-logs
          path: |
            configure-output.txt
            build-output.txt
            test-output.txt
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          job-name: build-and-test (Windows)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronos
          path: build/chronos.exe

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup-llvm

      - name: Configure
        run: |
          set -o pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++-19 -DBUILD_TESTS=ON 2>&1 | tee configure-output.txt

      - name: Build
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.txt

      - name: Test
        run: |
          set -o pipefail
          cd build && ctest --output-on-failure 2>&1 | tee ../test-output.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-logs
          path: |
            configure-output.txt
            build-output.txt
            test-output.txt
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          job-name: test-linux (Release)

  test-linux-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup-llvm

      - name: Configure
        run: |
          set -o pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++-19 -DBUILD_TESTS=ON 2>&1 | tee configure-output.txt

      - name: Build (Debug)
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.txt

      - name: Test (Debug)
        run: |
          set -o pipefail
          cd build && ctest --output-on-failure 2>&1 | tee ../test-output.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-debug-logs
          path: |
            configure-output.txt
            build-output.txt
            test-output.txt
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          job-name: test-linux-debug (Debug)

  sanitizer-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup-llvm

      - name: Configure
        run: |
          set -o pipefail
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DBUILD_TESTS=ON 2>&1 | tee configure-output.txt

      - name: Build with sanitizers
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.txt

      - name: Test with sanitizers
        run: |
          set -o pipefail
          cd build && ctest --output-on-failure 2>&1 | tee ../test-output.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-logs
          path: |
            configure-output.txt
            build-output.txt
            test-output.txt
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          job-name: sanitizer-check
